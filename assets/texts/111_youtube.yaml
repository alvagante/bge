description: "Il 2024 ha prodotto pi\xF9 panel \"Donne nel Tech\" di qualsiasi anno\
  \ nella storia, spesso a maggioranza maschile.\n\nE i numeri di rappresentazione\
  \ femminile in engineering sono rimasti sostanzialmente piatti. Coincidenza? No.\
  \ Sintomo.\n         \nIn questo episodio della Brigata dei Geek Estinti ci mettiamo\
  \ a ragionare senza il copione della diversity week: perch\xE9 il settore tech ha\
  \ ancora un problema strutturale con le donne, non nonostante i programmi di inclusione,\
  \  ma spesso anche a causa di come vengono impostati.\n\nLe domande che non risparmiano\
  \ nessuno:\n\n- Il \"pipeline problem\" \xE8 una scusa o una causa reale? E se \xE8\
  \ reale, chi ha rotto il tubo?\n- Perch\xE9 molte donne che entrano nel tech ci\
  \ restano meno anni degli uomini e cosa racconta questo delle culture aziendali,\
  \ non delle persone?\n- Le quote funzionano o spostano il problema a valle senza\
  \ risolverlo a monte?\n- Quanto della narrazione \"role model\" \xE8 sostanza e\
  \ quanto \xE8 marketing ben confezionato?\n- Cosa stanno facendo alcune aziende\
  \ che in silenzio funziona davvero e  perch\xE9 non fa notizia quanto i grandi annunci?\
  \                                \n\nNon stiamo celebrando e non stiamo demolendo.\
  \ Stiamo ragionando, con la solita franchezza BGE che o ami o non capisci perch\xE9\
  \ esiste.\n\nGuardalo live, porta le tue opinioni \u2014 specie se non sono comode.\
  \ I commenti ovattati li buttiamo fuori.\n\nIscriviti al canale se vuoi tecnologia\
  \ senza filtri. E se hai qualcosa da dire sull'argomento, dillo sotto: il dibattito\
  \ \xE8 il format.\n                                                            \
  \                    \nGeek Estinto, in modalit\xE0 \"Adesso parlo io\".\n\n#WomenInTech\
  \ #Podcast #Tech #Tecnologia #DiversityAndInclusion #GeekEstinti  #BGE #PodcastItaliano\
  \ #Engineering #CulturaGeek"
