description: 'Episodio speciale.


  Una sessione di "building with public", dove interagiamo con chiunque voglia interagire
  mentre costruiamo qualcosa.

  Per entrate in Live basta collegarsi a questo Google Meeting: https://meet.google.com/zag-okai-udi


  In questo caso il pretesto e'' la pubblicazione della nuova release di Pabawi, un
  frontend web per Puppet, Bolt, Ansible (aggiunto in questa versione 0.7.0) realizzato
  in vibe coding.


  Se sei uno sviluppatore Javascript, un vibe coder, un utente di puppet o Ansible
  o un curioso di AI agentica, questa puo'' essere una buona occasione per parlare
  di questi temi.'
